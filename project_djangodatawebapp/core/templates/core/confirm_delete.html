{% extends "core/base.html" %}

{% block content %}
    <h1>Delete Record</h1>

    <p>Are you sure you want to delete this trip?</p>
    <p>
        <strong>{{ record.origin }}</strong> to
        <strong>{{ record.destination }}</strong> on
        <strong>{{ record.start_date }}</strong>
    </p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
    </form>

    <p><a href="{% url 'record_detail' record.pk %}">Cancel</a></p>
{% endblock %}
