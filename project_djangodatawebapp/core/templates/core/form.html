{% extends "core/base.html" %}

{% block content %}
    <h1>{{ title }}</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">{{ submit_text|default:title }}</button>
    </form>

    <p><a href="{% url 'record_list' %}">Back to List</a></p>
{% endblock %}
